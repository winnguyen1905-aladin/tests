version: '3.8'

networks:
  default:
    name: sam3-network

volumes:
  minio_data:
  postgres_data:

services:

  # PostgreSQL + PostGIS + pgvector
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sam3-postgres
    environment:
      POSTGRES_DB:       sam3
      POSTGRES_USER:     sam3user
      POSTGRES_PASSWORD: sam3pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-pgcrypto.sql:/docker-entrypoint-initdb.d/01-pgcrypto.sql:ro
      - ./scripts/init-pgvector-postgis.sql:/docker-entrypoint-initdb.d/02-pgvector-postgis.sql:ro
    command: >
      bash -c "apt-get update && apt-get install -y postgresql-16-pgvector
      && docker-entrypoint.sh postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sam3user -d sam3"]
      interval: 10s
      timeout: 10s
      retries: 30
    restart: unless-stopped

  # MinIO Object Storage (lightweight, ~150MB)
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
