# ============================================================
# SAM3 Production Docker Compose
# ========================= ====================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml down
#   docker compose -f docker-compose.prod.yml logs -f sam3-api
# ============================================================

networks:
  sam3-network:
    driver: bridge
    name: sam3-prod-network

volumes:
  postgres_data:
    name: sam3-postgres-prod
  milvus_data:
    name: sam3-milvus-prod
  minio_data:
    name: sam3-minio-prod
  etcd_data:
    name: sam3-etcd-prod
  sam3-logs:
    name: sam3-logs-prod

services:

  # ── PostgreSQL + PostGIS + pgvector ───────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sam3-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sam3}
      POSTGRES_USER: ${POSTGRES_USER:-sam3user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-pgcrypto.sql:/docker-entrypoint-initdb.d/01-pgcrypto.sql:ro
      - ./scripts/init-pgvector-postgis.sql:/docker-entrypoint-initdb.d/02-pgvector-postgis.sql:ro
    command: >
      bash -c "apt-get update && apt-get install -y postgresql-16-pgvector
      && docker-entrypoint.sh postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sam3user} -d ${POSTGRES_DB:-sam3}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sam3-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ── Milvus Vector Database ────────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: milvus-prod
    restart: unless-stopped
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MILVUS_DATA=/var/lib/milvus
      - MILVUS_USE_GPU=${MILVUS_USE_GPU:-false}
      - MILVUS_INDEX_BUILD_CONCURRENCY=${MILVUS_INDEX_BUILD_CONCURRENCY:-16}
      - MILVUS_QUERY_NODE_CONCURRENCY=${MILVUS_QUERY_NODE_CONCURRENCY:-256}
    command: ["milvus", "run", "standalone"]
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - sam3-network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # ── Etcd (Milvus metadata) ─────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: etcd-prod
    restart: unless-stopped
    environment:
      - ETCD_NAME=etcd
      - ETCD_DATA_DIR=/etcd
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_INITIAL_CLUSTER=etcd=http://etcd:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=milvus-etcd-prod
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 5s
      retries: 10
    networks:
      - sam3-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ── MinIO Object Storage ───────────────────────────────────────────
  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-latest}
    container_name: minio-prod
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 10s
    networks:
      - sam3-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ── MinIO Client (for bucket setup) ────────────────────────────────
  minio-setup:
    image: minio/mc:${MINIO_IMAGE_TAG:-latest}
    container_name: minio-client-prod
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD};
      mc anonymous set public minio/tree-features;
      mc admin info minio;
      exit 0"
    networks:
      - sam3-network

  # ── Attu (Milvus Web UI) ────────────────────────────────────────────
  attu:
    image: zilliz/attu:v2.4
    container_name: milvus-attu-prod
    restart: unless-stopped
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - sam3-network

  # ── SAM3 API (Production) ───────────────────────────────────────────
  sam3-api:
    image: sam3-api:staging
    container_name: sam3-api-prod
    restart: unless-stopped
    expose:
      - "8001"
    ports:
      - "${API_PORT:-8001}:8001"
    env_file:
      - .env.prod
    environment:
      # Override via .env.prod — these are just defaults
      - ENV=prod
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      # Milvus
      - MILVUS_URI=http://milvus:19530
      # MinIO
      - MINIO_ENDPOINT=minio:9000
      - MINIO_SECURE=false
      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    volumes:
      # Mount for static file serving if needed
      - ./ingest-data:/app/ingest-data:ro
      # Logs
      - sam3-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - sam3-network
    deploy:
      resources:
        limits:
          # Adjust based on your GPU memory
          memory: 16G
        reservations:
          memory: 4G

  # ── Nginx Reverse Proxy ────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sam3-nginx-prod
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # TLS certificates (mount or provision via certbot)
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      sam3-api:
        condition: service_healthy
    networks:
      - sam3-network
    profiles:
      - nginx

